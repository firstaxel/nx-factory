name: Publish to npm

on:
  push:
    branches:
      - main        # build + typecheck only (no publish)
    tags:
      - 'v*.*.*'    # build + publish to npm

  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (latest | next | beta | canary)'
        required: false
        default: 'latest'
      dry_run:
        description: 'Dry run — build and pack but do not publish'
        type: boolean
        required: false
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Job 1: Build & typecheck ──────────────────────────────────────────────────
  # Runs on every push to main AND every version tag push.
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Upload compiled dist/ so the publish job reuses it without rebuilding
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Job 2: Publish ────────────────────────────────────────────────────────────
  # Runs ONLY on version tags (v*.*.*) or manual workflow_dispatch.
  # A plain push to main skips this entirely — safe for WIP merges.
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: write   # needed to create a GitHub Release
      id-token: write   # needed for npm provenance attestation

    environment:
      name: npm
      url: https://www.npmjs.com/package/nx-factory-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # ── Resolve version + dist-tag ──────────────────────────────────────────
      # v2.1.0        → tag: latest
      # v2.1.0-beta.1 → tag: beta
      # v2.1.0-next.0 → tag: next
      # manual        → uses workflow_dispatch inputs
      - name: Resolve version and dist-tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=$(node -p "require('./package.json').version")
            TAG="${{ github.event.inputs.tag }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            if   [[ "$VERSION" == *"-beta"*   ]]; then TAG="beta"
            elif [[ "$VERSION" == *"-next"*   ]]; then TAG="next"
            elif [[ "$VERSION" == *"-canary"* ]]; then TAG="canary"
            elif [[ "$VERSION" == *"-alpha"*  ]]; then TAG="alpha"
            else TAG="latest"
            fi
            DRY_RUN="false"
          fi
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN"  >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION  tag=$TAG  dry_run=$DRY_RUN"

      # Stamp the exact version from the git tag into package.json
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version

      # Validate package contents before touching npm
      - name: Validate pack
        run: npm pack --dry-run

      # ── Real publish ────────────────────────────────────────────────────────
      - name: Publish to npm
        if: steps.meta.outputs.dry_run != 'true'
        run: |
          npm publish \
            --access public \
            --tag "${{ steps.meta.outputs.tag }}" \
            --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Dry run branch ──────────────────────────────────────────────────────
      - name: Publish dry run
        if: steps.meta.outputs.dry_run == 'true'
        run: |
          echo "DRY RUN — would publish nx-factory-cli @${{ steps.meta.outputs.version }} --tag ${{ steps.meta.outputs.tag }}"
          npm publish --dry-run --access public

      # ── Auto GitHub Release ─────────────────────────────────────────────────
      # Generates release notes from merged PRs + commits since last tag.
      - name: Create GitHub Release
        if: >
          startsWith(github.ref, 'refs/tags/v') &&
          steps.meta.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.tag != 'latest' }}
